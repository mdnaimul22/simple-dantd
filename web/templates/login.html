<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Admin Login — Dante Proxy</title>
  <meta name="description" content="Dante SOCKS5 proxy management admin login">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

  <div class="container small">
    <h1>🔐 Dante Proxy</h1>
    <div class="glass-card">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <ul class="flashes">
            {% for category, message in messages %}
              <li class="{{ category }}">{{ message }}</li>
            {% endfor %}
          </ul>
        {% endif %}
      {% endwith %}

      <form method="post" action="/login" autocomplete="off">
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" required placeholder="admin" autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required placeholder="••••••••">
        </div>
        <div class="form-actions">
          <button type="submit" class="cyber-button primary" id="loginBtn" style="width:100%; justify-content:center; padding:10px;">
            Authenticate →
          </button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
